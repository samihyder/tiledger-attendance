{% extends "base.html" %}
{% block title %}Override Required — TiLedger Attendance{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm border-warning">
      <div class="card-header bg-warning text-dark">
        <i class="bi bi-shield-lock me-2"></i>
        <strong>Admin Override Required</strong>
      </div>
      <div class="card-body">
        <p class="text-muted mb-3">
          <strong>{{ permission_label }}</strong> requires the Super Admin override password.
        </p>

        <form method="POST" action="{{ url_for('auth.request_override') }}">
          <input type="hidden" name="next_url" value="{{ next_url }}">

          <div class="mb-3">
            <label class="form-label fw-semibold">Override Password</label>
            <input type="password" name="password" class="form-control" autofocus
                   placeholder="Enter super admin override password">
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-warning">
              <i class="bi bi-unlock me-1"></i>Unlock Access
            </button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
