{% extends 'base.html' %}
{% block title %}Edit Roster Entry{% endblock %}
{% block content %}

<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('roster.list_rosters') }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <div>
    <h4 class="fw-bold mb-0">Edit Roster Entry</h4>
    <p class="text-muted small mb-0">{{ roster.full_name }} &bull; {{ roster.employee_code }} &bull; {{ roster.roster_date }}</p>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-semibold">Employee</label>
            <input type="text" class="form-control" value="{{ roster.full_name }} ({{ roster.employee_code }})" disabled>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Date</label>
            <input type="text" class="form-control" value="{{ roster.roster_date }}" disabled>
          </div>

          <div class="mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="is_holiday" value="1"
                     id="isHoliday" onchange="toggleShift(this)"
                     {% if roster.is_holiday %}checked{% endif %}>
              <label class="form-check-label fw-semibold" for="isHoliday">Day Off / Holiday</label>
            </div>
          </div>

          <div id="shiftGroup" class="mb-4 {% if roster.is_holiday %}d-none{% endif %}">
            <label class="form-label fw-semibold">Shift <span class="text-danger">*</span></label>
            <select name="shift_id" class="form-select" id="shiftSelect">
              <option value="">— Select shift —</option>
              {% for s in shifts %}
                <option value="{{ s.id }}"
                  {% if s.id == roster.shift_id %}selected{% endif %}>
                  {{ s.shift_name }} ({{ s.shift_start[:5] }} → {{ s.shift_end[:5] }})
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Notes <span class="text-muted fw-normal">(optional)</span></label>
            <input type="text" name="notes" class="form-control" value="{{ roster.notes or '' }}"
                   placeholder="e.g. Shift swap, emergency cover">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary fw-semibold px-4">
              <i class="bi bi-check2-circle me-2"></i>Save Changes
            </button>
            <a href="{{ url_for('roster.list_rosters') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
function toggleShift(cb) {
  document.getElementById('shiftGroup').classList.toggle('d-none', cb.checked);
  document.getElementById('shiftSelect').required = !cb.checked;
}
document.getElementById('shiftSelect').required = !document.getElementById('isHoliday').checked;
</script>
{% endblock %}
